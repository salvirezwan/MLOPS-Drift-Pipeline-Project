services:

  api:
    build:
      context: .
      dockerfile: serving/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./feature_store/store.db:/app/feature_store/store.db
      - ./data/reference:/app/data/reference
      - ./.env:/app/.env
    environment:
      - MLFLOW_TRACKING_URI=mlruns
      - SHADOW_MODE=${SHADOW_MODE:-true}
      - MODEL_NAME=${MODEL_NAME:-adult_income_classifier}
    depends_on:
      - mlflow
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    working_dir: /mlflow
    command: >
      bash -c "pip install -q mlflow==2.13.0 && mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow/mlruns"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3005:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
