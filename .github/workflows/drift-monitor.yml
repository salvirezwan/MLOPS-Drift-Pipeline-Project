name: Drift Monitor

on:
  schedule:
    - cron: "0 6 * * *"   # Every day at 06:00 UTC
  workflow_dispatch:       # Allow manual trigger for testing

jobs:
  detect-drift:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    env:
      MLFLOW_TRACKING_URI: mlruns

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run drift detection
        id: drift
        run: |
          python - <<'EOF'
          import json, os, sys
          sys.path.insert(0, ".")
          from monitoring.drift_detector import run_drift_detection
          result = run_drift_detection()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"drift_score={result['drift_score']}\n")
              f.write(f"drift_detected={str(result['drift_detected']).lower()}\n")
              f.write(f"current_rows={result.get('current_rows', 0)}\n")
              html = result.get('report_html_path') or ''
              f.write(f"report_html={html}\n")
          EOF

      - name: Upload drift report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report-${{ github.run_number }}
          path: monitoring/reports/
          retention-days: 30

      - name: Post GitHub Issue on drift detected
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const score = '${{ steps.drift.outputs.drift_score }}';
            const rows  = '${{ steps.drift.outputs.current_rows }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Drift detected: score ${score} (run ${context.runNumber})`,
              body: [
                '## Data Drift Alert',
                '',
                `Evidently drift score **${score}** exceeds threshold **0.15**.`,
                '',
                '| Metric | Value |',
                '|---|---|',
                `| Drift Score | ${score} |`,
                `| Threshold | 0.15 |`,
                `| Inference Rows Checked | ${rows} |`,
                '',
                `[View drift report artifact](${runUrl})`,
                '',
                'The `retrain.yml` workflow will be triggered automatically via `repository_dispatch`.',
              ].join('\n'),
              labels: ['drift', 'retraining'],
            });

      - name: Trigger retraining on drift
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'drift-detected',
              client_payload: {
                drift_score: '${{ steps.drift.outputs.drift_score }}',
                triggered_at: new Date().toISOString(),
                source: 'drift-monitor.yml',
              },
            });
